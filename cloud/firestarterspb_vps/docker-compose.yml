services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5

  n8n:
    image: n8nio/n8n:1.97.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL}
      GENERIC_TIMEZONE: ${TZ:-UTC}
      TZ: ${TZ:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n

  firestarter-worker:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /repo
    command:
      - python
      - scripts/automation/cloud_health_check.py
      - --serve
      - --host
      - 0.0.0.0
      - --port
      - "8090"
    environment:
      TZ: ${TZ:-UTC}
      FIRESTARTER_CLOUD_WORKER_EXECUTE: ${FIRESTARTER_CLOUD_WORKER_EXECUTE:-false}
      FIRESTARTER_CLOUD_LOG_DIR: ${FIRESTARTER_CLOUD_LOG_DIR:-/repo/logs/cloud}
      FIRESTARTER_CLOUD_STATE_DIR: ${FIRESTARTER_CLOUD_STATE_DIR:-/repo/state/cloud}
    volumes:
      - ../../configs:/repo/configs:ro
      - ../../scripts:/repo/scripts:ro
      - ../../reports:/repo/reports
      - ../../logs:/repo/logs
      - ../../state:/repo/state
    ports:
      - "127.0.0.1:${WORKER_PORT:-8090}:8090"
    healthcheck:
      test:
        - CMD
        - python
        - scripts/automation/cloud_health_check.py
        - --once
      interval: 60s
      timeout: 20s
      retries: 3

  dashboard:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8080}:80"
    volumes:
      - ../../reports/html:/usr/share/nginx/html:ro
    depends_on:
      - firestarter-worker

volumes:
  postgres_data:
  n8n_data:
